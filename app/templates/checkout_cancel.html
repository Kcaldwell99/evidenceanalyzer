<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled — Evidentix™</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 3rem 2rem;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.6rem; font-weight: 700; color: #94a3b8; margin-bottom: 0.75rem; }
    p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; margin-bottom: 1rem; }
    .btn {
      display: inline-block;
      background: #7c8cf8;
      color: #fff;
      border-radius: 7px;
      padding: 0.75rem 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      margin-top: 1rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #6470e6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">↩️</div>
    <h1>Payment Cancelled</h1>
    <p>No charge was made. You can return to the dashboard and try again whenever you're ready.</p>
    <a href="/" class="btn">Back to Dashboard</a>
  </div>
</body>
</html>
