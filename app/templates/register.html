<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - Evidentix</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
       font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }
    .brand { text-align: center; margin-bottom: 2rem; }
    .brand h1 { font-size: 1.6rem; font-weight: 700; color: #7c8cf8; }
    .brand p { font-size: 0.85rem; color: #64748b; margin-top: 0.3rem; }
    .error {
      background: #3b1f1f;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }
    input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 7px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 0.65rem 0.9rem;
      margin-bottom: 1.2rem;
      outline: none;
      min-height: 42px;
    }
    input:focus { border-color: #7c8cf8; }
    .hint { font-size: 0.78rem; color: #475569; margin-top: -0.9rem; margin-bottom: 1.2rem; }
    button[type="submit"] {
      width: 100%;
      background: #7c8cf8;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem;
      cursor: pointer;
      margin-top: 0.25rem;
    }
    button[type="submit"]:hover { background: #6470e6; }
    .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #64748b; }
    .footer-link a { color: #7c8cf8; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
.early-access-banner {
  background-color: #f1f5f9;
  border-bottom: 1px solid #e2e8f0;
  color: #334155;
  text-align: center;
  padding: 10px 16px;
  font-size: 14px;
  font-family: inherit;
  line-height: 1.4;
}
.early-access-banner strong {
  color: #1e293b;
  font-weight: 600;
}
  </style>
</head>

      <label for="password_confirm">Confirm Password</label>
