<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Compare Two Videos</title>
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<header class="site-header-wrap">
  <div class="site-header">
    <span class="brand"><span class="brand-name">Evidence Analyzer</span><span class="brand-tag">by Evidentix</span></span>
    <a href="/" class="sign-in">Dashboard</a>
  </div>
</header>
<main style="max-width:700px;margin:40px auto;padding:0 20px;">
  <h1>Compare Two Videos</h1>
  <p>Upload two video files to compare their frames, metadata, and generate a forensic similarity report.</p>
  <div style="background:white;border-radius:10px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.06);">
    <form method="post" action="/compare-video" enctype="multipart/form-data">
      <label style="font-weight:bold;display:block;margin-bottom:6px;">Reference Video (Original)</label>
      <input type="file" name="original_file" accept="video/*" required style="margin-bottom:16px;display:block;">
      <label style="font-weight:bold;display:block;margin-bottom:6px;">Suspect Video</label>
      <input type="file" name="suspect_file" accept="video/*" required style="margin-bottom:16px;display:block;">
      <button type="submit" style="background:#2563eb;color:white;padding:10px 20px;border:none;border-radius:6px;cursor:pointer;">Compare Videos</button>
    </form>
  </div>
  <a href="/" style="display:inline-block;margin-top:16px;color:#2563eb;">Back to Dashboard</a>
</main>
</body>
</html>
