<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Evidentix™</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #7c8cf8;
      letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 0.3rem;
    }

    .error {
      background: #3b1f1f;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 7px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 0.65rem 0.9rem;
      margin-bottom: 1.2rem;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #7c8cf8;
    }

    button[type="submit"] {
      width: 100%;
      background: #7c8cf8;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.25rem;
    }

    button[type="submit"]:hover {
      background: #6470e6;
    }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #64748b;
    }

    .footer-link a {
      color: #7c8cf8;
      text-decoration: none;
    }

    .footer-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <h1>Evidentix™</h1>
      <p>Digital Evidence Platform</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autofocus autocomplete="email" />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />

      <button type="submit">Sign In</button>
    </form>

    <div class="footer-link">
      Don't have an account? <a href="/register">Create one</a>
    </div>
    </div>
    <p style="position:fixed; bottom:1rem; left:0; right:0; font-size:0.78rem; color:#475569; text-align:center;">
      &copy; 2026 Evidence Analyzer, LLC. | <a href="/terms" style="color:#475569;">Terms of Use</a> | <a href="/privacy" style="color:#475569;">Privacy Policy</a>
    </p>
</body>
</html>
